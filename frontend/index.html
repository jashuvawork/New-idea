<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusQuant — Indian Index Options Scalping Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* Critical paint — visible before Tailwind bundle loads */
      html, body { margin: 0; background: #0a0e17; color: #f3f4f6; font-family: Inter, system-ui, sans-serif; }
      #root { min-height: 100vh; }
      .boot-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1rem; }
      .boot-spinner { width: 2.5rem; height: 2.5rem; border: 2px solid #06b6d4; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .boot-text { color: #9ca3af; font-size: 0.875rem; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-loader">
        <div class="boot-spinner"></div>
        <p class="boot-text">Loading NexusQuant…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
