name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "deploy/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy-ec2.yml"

env:
  AWS_REGION: ap-south-1
  EC2_INSTANCE_ID: i-02b2962f02b61005f

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy NexusQuant on EC2 via SSM
        id: deploy
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub Actions deploy $(git rev-parse --short HEAD 2>/dev/null || echo manual)" \
            --parameters 'commands=[
              "set -euo pipefail",
              "export HOME=/root",
              "export GIT_CONFIG_GLOBAL=/root/.gitconfig",
              "git config --global --add safe.directory /opt/nexusquant/New-idea",
              "git config --global --add safe.directory /opt/nexusquant",
              "REPO=/opt/nexusquant/New-idea",
              "ENV=/opt/nexusquant/env",
              "cd $REPO",
              "git fetch origin main",
              "git checkout main",
              "git pull --ff-only origin main || git reset --hard origin/main",
              "COMMIT=$(git rev-parse --short HEAD)",
              "echo Deploying commit $COMMIT",
              "touch $ENV",
              "for k in MAX_OPTION_PREMIUM_INR MIN_OPTION_PREMIUM_INR DAILY_PROFIT_STAGE_LOCKS_ENABLED DAILY_PROFIT_STAGE_PCTS UPSTOX_WS_ENABLED TICK_SNAPSHOT_SECONDS MARKET_POLL_SECONDS_WS SSE_ENABLED PAPER_LIVE_PARITY_ENABLED PAPER_SIMULATE_BROKER_ORDERS; do",
              "  line=$(grep -E \"^${k}=\" deploy/env.production.template | tail -1 || true)",
              "  [ -z \"$line\" ] && continue",
              "  val=${line#*=}",
              "  if grep -q \"^${k}=\" $ENV; then sed -i \"s|^${k}=.*|${k}=${val}|\" $ENV; else echo \"${k}=${val}\" >> $ENV; fi",
              "  echo synced $k=$val",
              "done",
              "bash deploy/ec2-update.sh"
            ]' \
            --query Command.CommandId \
            --output text)
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "SSM command: $CMD_ID"

      - name: Wait for SSM command
        run: |
          set -euo pipefail
          CMD_ID="${{ steps.deploy.outputs.command_id }}"
          for i in $(seq 1 40); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ env.EC2_INSTANCE_ID }}" \
              --query Status \
              --output text 2>/dev/null || echo Pending)
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "${{ env.EC2_INSTANCE_ID }}" \
                --query StandardOutputContent \
                --output text | tail -40
              exit 0
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "${{ env.EC2_INSTANCE_ID }}" \
                --output json
              exit 1
            fi
            sleep 15
          done
          echo "SSM command timed out"
          exit 1

      - name: Verify public deployment status
        run: |
          curl -sf https://www.jashuvatrade.xyz/api/deployment/status | python3 -m json.tool
