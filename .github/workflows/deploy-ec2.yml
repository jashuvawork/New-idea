name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  EC2_INSTANCE_ID: i-0f3f9e5e67815c21b

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Verify GitHub AWS secrets
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "::error::Missing GitHub Actions secrets AWS_ACCESS_KEY_ID and/or AWS_SECRET_ACCESS_KEY."
            echo "Add them under: Repository → Settings → Secrets and variables → Actions"
            echo "Or deploy manually: BRANCH=main bash deploy/aws-deploy.sh (with deploy/aws.env)"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy NexusQuant on EC2 via SSM
        id: deploy
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub Actions deploy $(git rev-parse --short HEAD 2>/dev/null || echo manual)" \
            --parameters 'commands=[
              "set -euo pipefail",
              "export HOME=/root",
              "export GIT_CONFIG_GLOBAL=/root/.gitconfig",
              "git config --global --add safe.directory /opt/nexusquant/New-idea",
              "git config --global --add safe.directory /opt/nexusquant",
              "REPO=/opt/nexusquant/New-idea",
              "ENV=/opt/nexusquant/env",
              "cd $REPO",
              "git fetch origin main",
              "git checkout main",
              "git pull --ff-only origin main || git reset --hard origin/main",
              "COMMIT=$(git rev-parse --short HEAD)",
              "echo Deploying commit $COMMIT",
              "touch $ENV",
              "for k in LATENCY_MODE MAX_OPTION_PREMIUM_INR MIN_OPTION_PREMIUM_INR EXPLOSION_CHEAP_RIP_MIN_PREMIUM_INR EXPLOSION_CHEAP_RIP_MIN_PEAK_PCT EXPLOSION_EXTENDED_CHASE_BLOCK_ENABLED EXPLOSION_EXTENDED_CHASE_MIN_MOVE_PCT EXPLOSION_IMMATURE_BLOCK_ENABLED EXPLOSION_IMMATURE_MIN_SESSION_MOVE_PCT EXPLOSION_CHOP_MIN_SESSION_MOVE_PCT EXPLOSION_HARD_LOT_CAP EXPLOSION_REENTRY_COOLDOWN_SECONDS LOSS_STREAK_PAUSE_COUNT SESSION_LARGE_LOSS_PAUSE_INR ICT_ALL_DAY_CAPTURE_ENABLED ICT_DEFENSIVE_BASE_RIP_ENABLED ICT_MAX_PROFIT_SKIP_HARD_TARGET ICT_MAX_PROFIT_TARGET_POINTS ICT_FORCE_MAX_LOTS_BLOCK_ON_CHOP QUICK_SIDEWAYS_ENABLED WORST_DAY_QUICK_ENABLED WORST_DAY_BLOCK_QUICK_TRADES WORST_DAY_ALLOW_SCALP_MOMENTUM WHIPSAW_ELITE_MOMENTUM_FLIP_BYPASS_ENABLED COMPOSER_HARD_GATE_ENABLED COMPOSER_BIAS_GATE_ENABLED SESSION_MODE_FEEDBACK_ENABLED SIZE_UNTIL_FIRST_GREEN_ENABLED SIZE_UNTIL_FIRST_GREEN_LOT_CAP FAKE_EXPLOSION_TRAP_ENABLED FULL_REST_REBUILD_TIMEOUT_SECONDS FULL_REST_MIN_SECONDS FULL_REST_BACKOFF_SLOW_MS FULL_REST_BACKOFF_SECONDS DAILY_PROFIT_STAGE_LOCKS_ENABLED DAILY_PROFIT_STAGE_PCTS UPSTOX_WS_ENABLED MARKET_POLL_SECONDS_WS TICK_SNAPSHOT_SECONDS MARKET_POLL_INTERVAL_MS MARKET_POLL_INTERVAL_WS_MS TICK_SNAPSHOT_INTERVAL_MS SNAPSHOT_CACHE_INTERVAL_MS WS_SNAPSHOT_CACHE_INTERVAL_MS TICK_WAKE_DEBOUNCE_MS ENTRY_SCAN_INTERVAL_MS EXPIRY_ENTRY_SCAN_INTERVAL_MS SSE_HEARTBEAT_SECONDS SSE_ENABLED PAPER_LIVE_PARITY_ENABLED PAPER_SIMULATE_BROKER_ORDERS; do",
              "  line=$(grep -E \"^${k}=\" deploy/env.production.template | tail -1 || true)",
              "  [ -z \"$line\" ] && continue",
              "  val=${line#*=}",
              "  if grep -q \"^${k}=\" $ENV; then sed -i \"s|^${k}=.*|${k}=${val}|\" $ENV; else echo \"${k}=${val}\" >> $ENV; fi",
              "  echo synced $k=$val",
              "done",
              "bash deploy/ec2-update.sh"
            ]' \
            --query Command.CommandId \
            --output text)
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "SSM command: $CMD_ID"

      - name: Wait for SSM command
        run: |
          set -euo pipefail
          CMD_ID="${{ steps.deploy.outputs.command_id }}"
          for i in $(seq 1 40); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ env.EC2_INSTANCE_ID }}" \
              --query Status \
              --output text 2>/dev/null || echo Pending)
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "${{ env.EC2_INSTANCE_ID }}" \
                --query StandardOutputContent \
                --output text | tail -40
              exit 0
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "${{ env.EC2_INSTANCE_ID }}" \
                --output json
              exit 1
            fi
            sleep 15
          done
          echo "SSM command timed out"
          exit 1

      - name: Verify public deployment status
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if curl -sf --connect-timeout 5 --max-time 15 \
              https://www.jashuvatrade.xyz/api/deployment/status | python3 -m json.tool; then
              exit 0
            fi
            echo "verify attempt $i failed — waiting"
            sleep 8
          done
          # Last resort: local health via SSM already passed in ec2-update; surface public failure
          curl -sf --connect-timeout 5 --max-time 20 \
            https://www.jashuvatrade.xyz/health | python3 -m json.tool
          curl -sf --connect-timeout 5 --max-time 20 \
            https://www.jashuvatrade.xyz/api/deployment/status | python3 -m json.tool
