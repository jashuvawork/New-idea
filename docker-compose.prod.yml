services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - /opt/nexusquant/env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - /opt/nexusquant/data/trades:/opt/nexusquant/data/trades
    depends_on:
      - redis
    restart: unless-stopped
    # Hung asyncio loop still accepts TCP but never answers /health.
    # Kill PID 1 on probe failure so restart:unless-stopped brings it back
    # (docker "unhealthy" alone does NOT restart the container).
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\" || kill -TERM 1",
        ]
      interval: 20s
      timeout: 5s
      retries: 2
      start_period: 60s

volumes:
  redis_data:
